spring:
  application:
    name: myfschool-be
  datasource:
    url: ${POSTGRES_DB_URL:jdbc:postgresql://localhost:5432/prm393}
    username: ${POSTGRES_DB_USERNAME:postgres}
    password: ${POSTGRES_DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.springframework.jdbc.core: DEBUG
    org.springframework.jdbc.core.StatementCreatorUtils: TRACE
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

app:
  jwt:
    # Override JWT_SECRET in production with a random secret of at least 32 bytes.
    secret: ${JWT_SECRET:prm393-development-jwt-secret-change-me-2026}
    expiration: ${JWT_EXPIRATION:28800s}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:2592000s}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:Admin@123}
    email: ${ADMIN_EMAIL:admin@myfschool.local}
