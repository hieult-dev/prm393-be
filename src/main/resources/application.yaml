spring:
  application:
    name: myfschool-be
  datasource:
    url: ${SQLSERVER_DB_URL:jdbc:sqlserver://localhost:1433;databaseName=prm393;encrypt=true;trustServerCertificate=true}
    username: ${SQLSERVER_DB_USERNAME:sa}
    password: ${SQLSERVER_DB_PASSWORD:sa}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.springframework.jdbc.core: DEBUG
    org.springframework.jdbc.core.StatementCreatorUtils: TRACE
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
